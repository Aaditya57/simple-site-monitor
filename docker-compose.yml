services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: monitor
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-monitor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      target: api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://monitor:${DB_PASSWORD:-monitor}@db:${DB_PORT:-5432}/monitor
      REDIS_URL: redis://redis:${REDIS_PORT:-6379}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://api:${PORT:-3000}/api/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://monitor:${DB_PASSWORD:-monitor}@db:${DB_PORT:-5432}/monitor
      REDIS_URL: redis://redis:${REDIS_PORT:-6379}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  pgweb:
    image: sosedoff/pgweb
    restart: unless-stopped
    ports:
      - "${PGWEB_PORT:-8181}:8081"
    environment:
      DATABASE_URL: postgresql://monitor:${DB_PASSWORD:-monitor}@db:${DB_PORT:-5432}/monitor?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/web/dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
